<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LMS - Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-page sidebar-open">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">LMS</span>
      </div>
      <button class="sidebar-toggle" onclick="app.toggleSidebar()">☰</button>
    </div>

    <!-- User Info -->
    <div class="sidebar-user">
      <img id="userAvatar" class="user-avatar" src="" alt="" onerror="this.style.display='none'">
      <div id="userName" class="user-name"></div>
      <div id="currentDomainLabel" class="current-domain"></div>
    </div>

    <!-- Sidebar Navigation -->
    <nav class="sidebar-nav">
      <a class="nav-item" onclick="app.navigate('home')">🏠 <span data-i18n="home">ホーム</span></a>
      <a class="nav-item" onclick="app.navigate('record')">📝 <span data-i18n="record">記録する</span></a>
      <a class="nav-item" onclick="app.navigate('actions')">⚡ <span data-i18n="actions">アクション</span></a>
      <a class="nav-item" onclick="app.navigate('ask_ai')">🤖 <span data-i18n="ask_ai">AIに相談</span></a>
      <a class="nav-item" onclick="app.navigate('settings')">⚙️ <span data-i18n="settings">設定</span></a>
      <a class="nav-item" id="adminLink" onclick="app.navigate('admin')" style="display:none">🔧 <span data-i18n="admin">管理パネル</span></a>
    </nav>

    <!-- Domain Quick Switch (sidebar) -->
    <div class="sidebar-domains">
      <div class="sd-label">Domains</div>
      <a class="sd-item" onclick="app.switchDomain('consciousness')" data-domain="consciousness">🧠 <span>意識</span></a>
      <a class="sd-item" onclick="app.switchDomain('health')" data-domain="health">💚 <span>健康</span></a>
      <a class="sd-item" onclick="app.switchDomain('time')" data-domain="time">⏰ <span>時間</span></a>
      <a class="sd-item" onclick="app.switchDomain('contribution')" data-domain="contribution">💼 <span>貢献</span></a>
      <a class="sd-item" onclick="app.switchDomain('trust')" data-domain="trust">🤝 <span>信用</span></a>
      <a class="sd-item" onclick="app.switchDomain('assets')" data-domain="assets">💰 <span>資産</span></a>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="main-area">
    <!-- Domain Tabs (top) -->
    <div id="domainTabs" class="domain-tabs-container"></div>

    <!-- Sub Navigation -->
    <div id="subNav" class="sub-nav-container"></div>

    <!-- Page Content -->
    <div id="mainContent" class="main-content"></div>
  </main>

  <!-- Toast Container -->
  <div id="toastContainer"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- LMS Scripts -->
  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/components.js"></script>
  <script src="js/ai-engine.js"></script>
  <script src="js/firebase-backend.js"></script>
  <script src="js/affiliate.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Load saved configs
    try {
      const savedFb = localStorage.getItem('lms_firebaseConfig');
      if (savedFb) Object.assign(CONFIG.firebase, JSON.parse(savedFb));
      const savedWorker = localStorage.getItem('lms_workerUrl');
      if (savedWorker) CONFIG.endpoints.anthropic = savedWorker;
    } catch (e) {}

    // Check entry domain from URL param or referrer
    const params = new URLSearchParams(window.location.search);
    const entryDomain = params.get('domain') || null;

    // Redirect to login if not authenticated
    if (!store.get('isAuthenticated')) {
      window.location.href = entryDomain ? entryDomain + '.html' : 'index.html';
    } else {
      app.init(entryDomain);
    }
  </script>
</body>
</html>
