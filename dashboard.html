<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LMS - Life Management System</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
</head>
<body>
  <div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a class="sidebar-logo" onclick="app.navigate('home')">
          <div class="sidebar-logo-icon">L</div>
          <div>
            <div class="sidebar-logo-text">LMS</div>
            <div class="sidebar-logo-sub">Life Management System</div>
          </div>
        </a>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-title">メニュー</div>
        <a class="nav-item active" data-page="home" onclick="app.navigate('home')">
          <span class="nav-dot"></span><span>ホーム</span>
        </a>
        <a class="nav-item" data-page="record" onclick="app.navigate('record')">
          <span class="nav-dot"></span><span>記録する</span>
        </a>
        <a class="nav-item" data-page="data" onclick="app.navigate('data')">
          <span class="nav-dot"></span><span>データを見る</span>
        </a>
        <a class="nav-item" data-page="actions" onclick="app.navigate('actions')">
          <span class="nav-dot"></span><span>アクション</span>
        </a>
        <a class="nav-item" data-page="ask_ai" onclick="app.navigate('ask_ai')">
          <span class="nav-dot"></span><span>相談する</span>
        </a>
        <a class="nav-item" data-page="integrations" onclick="app.navigate('integrations')">
          <span class="nav-dot"></span><span>連携</span>
        </a>
        <a class="nav-item" data-page="settings" onclick="app.navigate('settings')">
          <span class="nav-dot"></span><span>設定</span>
        </a>
        <a class="nav-item admin-only" data-page="admin" onclick="app.navigate('admin')" id="adminLink" style="display:none">
          <span class="nav-dot"></span><span>管理</span>
        </a>

        <div class="nav-section-title">領域</div>
        <a class="nav-item domain-nav" data-domain="consciousness" onclick="app.switchDomain('consciousness')">
          <span class="nav-num">一</span><span>意識</span>
        </a>
        <a class="nav-item domain-nav" data-domain="health" onclick="app.switchDomain('health')">
          <span class="nav-num">二</span><span>健康</span>
        </a>
        <a class="nav-item domain-nav" data-domain="time" onclick="app.switchDomain('time')">
          <span class="nav-num">三</span><span>時間</span>
        </a>
        <a class="nav-item domain-nav" data-domain="work" onclick="app.switchDomain('work')">
          <span class="nav-num">四</span><span>仕事</span>
        </a>
        <a class="nav-item domain-nav" data-domain="relationship" onclick="app.switchDomain('relationship')">
          <span class="nav-num">五</span><span>関係</span>
        </a>
        <a class="nav-item domain-nav" data-domain="assets" onclick="app.switchDomain('assets')">
          <span class="nav-num">六</span><span>資産</span>
        </a>
      </nav>

      <div class="sidebar-user" id="sidebar-user">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-info">
          <div class="user-name" id="userName">ゲスト</div>
          <div class="user-domain" id="currentDomainLabel">未設定</div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="top-bar" id="top-bar">
        <div class="top-bar-left">
          <button class="btn btn-icon btn-secondary" id="menu-toggle" onclick="app.toggleSidebar()">☰</button>
          <h2 class="top-bar-title" id="top-bar-title">ホーム</h2>
        </div>
        <div class="top-bar-right">
          <div id="domainTabs"></div>
          <button class="btn btn-sm btn-secondary" onclick="app.navigate('settings')">⚙️</button>
        </div>
      </div>

      <div class="page-content" id="mainContent"></div>
    </main>

  </div>

  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="app.toggleSidebar()"></div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title"></h3>
        <button class="modal-close" onclick="app.closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Footer -->
  <div style="text-align:center;padding:20px 16px;font-size:11px;color:#94a3b8;border-top:1px solid #e4e7ef;margin-top:20px">
    &copy; 2026 LMS - Life Management System
  </div>

  <!-- LMS Scripts -->
  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/components.js"></script>
  <script src="js/ai-engine.js"></script>
  <script src="js/firebase-backend.js"></script>
  <script src="js/affiliate.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/integrations.js"></script>
  <script src="js/time-marketplace.js"></script>
  <script src="js/assets-features.js"></script>
  <script src="js/work-features.js"></script>
  <script src="js/relationship-features.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Load saved configs
    try {
      const savedFb = localStorage.getItem('lms_firebaseConfig');
      if (savedFb) Object.assign(CONFIG.firebase, JSON.parse(savedFb));
      const savedWorker = localStorage.getItem('lms_workerUrl');
      if (savedWorker) CONFIG.endpoints.anthropic = savedWorker;
    } catch (e) {}

    const params = new URLSearchParams(window.location.search);
    const entryDomain = params.get('domain') || null;

    if (!store.get('isAuthenticated')) {
      window.location.href = entryDomain ? entryDomain + '.html' : 'index.html';
    } else {
      app.init(entryDomain);
    }
  </script>
</body>
</html>
