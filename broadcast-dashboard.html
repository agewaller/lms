<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Broadcast - Multi-Platform Distribution System</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/broadcast.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
</head>
<body>
  <div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a class="sidebar-logo" onclick="broadcastApp.navigate('compose')">
          <div class="sidebar-logo-icon">◈</div>
          <div>
            <div class="sidebar-logo-text">Broadcast</div>
            <div class="sidebar-logo-sub">Multi-Platform Distribution</div>
          </div>
        </a>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-title">メニュー</div>
        <a class="nav-item active" data-page="compose" onclick="broadcastApp.navigate('compose')">
          <span class="nav-dot"></span><span>書く</span>
        </a>
        <a class="nav-item" data-page="history" onclick="broadcastApp.navigate('history')">
          <span class="nav-dot"></span><span>配信ログ</span>
        </a>
        <a class="nav-item" data-page="scheduled" onclick="broadcastApp.navigate('scheduled')">
          <span class="nav-dot"></span><span>スケジュール</span>
        </a>
        <a class="nav-item" data-page="connections" onclick="broadcastApp.navigate('connections')">
          <span class="nav-dot"></span><span>プラットフォーム接続</span>
        </a>
        <a class="nav-item" data-page="ask_ai" onclick="broadcastApp.navigate('ask_ai')">
          <span class="nav-dot"></span><span>AI に相談</span>
        </a>
        <a class="nav-item" data-page="settings" onclick="broadcastApp.navigate('settings')">
          <span class="nav-dot"></span><span>設定</span>
        </a>

        <div class="nav-section-title">関連プロダクト</div>
        <a class="nav-item" href="index.html">
          <span class="nav-num">L</span><span>LMS (Life Management)</span>
        </a>
      </nav>

      <div class="sidebar-user" id="sidebar-user">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-info">
          <div class="user-name" id="userName">ゲスト</div>
          <div class="user-domain">Broadcast</div>
        </div>
        <button class="btn btn-sm btn-outline" onclick="broadcastApp.logout()" style="margin-left:auto">ログアウト</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="top-bar" id="top-bar">
        <div class="top-bar-left">
          <button class="btn btn-icon btn-secondary" id="menu-toggle" onclick="broadcastApp.toggleSidebar()">☰</button>
          <h2 class="top-bar-title" id="top-bar-title">書く</h2>
        </div>
        <div class="top-bar-right">
          <button class="btn btn-sm btn-secondary" onclick="broadcastApp.navigate('settings')">⚙️</button>
        </div>
      </div>

      <div class="page-content" id="mainContent"></div>
    </main>

  </div>

  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="broadcastApp.toggleSidebar()"></div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title"></h3>
        <button class="modal-close" onclick="broadcastApp.closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Footer -->
  <div style="text-align:center;padding:20px 16px;font-size:11px;color:#94a3b8;border-top:1px solid #e4e7ef;margin-top:20px">
    &copy; 2026 Broadcast - Multi-Platform Distribution System
  </div>

  <!-- Shared LMS infrastructure -->
  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/components.js"></script>
  <script src="js/ai-engine.js"></script>
  <script src="js/firebase-backend.js"></script>

  <!-- Broadcast scripts -->
  <script src="js/broadcast-config.js"></script>
  <script src="js/broadcast-store.js"></script>
  <script src="js/broadcast-ai.js"></script>
  <script src="js/broadcast-platforms.js"></script>
  <script src="js/broadcast-app.js"></script>

  <script>
    // Load saved configs (shared with LMS)
    try {
      const savedFb = localStorage.getItem('lms_firebaseConfig');
      if (savedFb) Object.assign(CONFIG.firebase, JSON.parse(savedFb));
      const savedWorker = localStorage.getItem('lms_workerUrl');
      if (savedWorker) CONFIG.endpoints.anthropic = savedWorker;
    } catch (e) {}

    if (!broadcastStore.get('isAuthenticated')) {
      window.location.href = 'broadcast.html';
    } else {
      broadcastApp.init();
    }
  </script>
</body>
</html>
